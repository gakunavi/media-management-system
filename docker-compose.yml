# MMS 常駐スタック（設計書 §2.1 / §2.2）
#   db     : PostgreSQL 16
#   migrate: prisma migrate deploy（1回だけ走って終了）
#   web    : Next.js 15
#   worker : Python 常駐（jobs をポーリング）
#
# ★ポート公開は必ず 127.0.0.1 に固定する（設計書 §8 / docs/RULES.md §12-1）
#   外部公開は Cloudflare Tunnel + Access のみ。0.0.0.0 で公開しない。

name: mms

services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MMS_POSTGRES_USER:-mms}
      POSTGRES_PASSWORD: ${MMS_POSTGRES_PASSWORD:?MMS_POSTGRES_PASSWORD を .env に設定してください}
      POSTGRES_DB: ${MMS_POSTGRES_DB:-mms}
      TZ: Asia/Tokyo
      # docs/RULES.md §9: 全ての日時は JST に正規化する
      PGTZ: Asia/Tokyo
    ports:
      - "127.0.0.1:${MMS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MMS_POSTGRES_USER:-mms} -d ${MMS_POSTGRES_DB:-mms}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    environment:
      MMS_DATABASE_URL: ${MMS_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Tokyo
      MMS_DATABASE_URL: ${MMS_DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET を .env に設定してください}
      AUTH_URL: ${MMS_PUBLIC_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      MMS_SMTP_HOST: ${MMS_SMTP_HOST:-}
      MMS_SMTP_PORT: ${MMS_SMTP_PORT:-587}
      MMS_SMTP_USER: ${MMS_SMTP_USER:-}
      MMS_SMTP_PASS: ${MMS_SMTP_PASS:-}
      MMS_SMTP_FROM: ${MMS_SMTP_FROM:-mms@localhost}
      # P2: 計測受口とリード（§8 / §16.2）
      MMS_INGEST_SECRET: ${MMS_INGEST_SECRET:-}
      MMS_PII_KEY: ${MMS_PII_KEY:-}
      MMS_INGEST_RATE_LIMIT: ${MMS_INGEST_RATE_LIMIT:-30}
      MMS_INGEST_ALLOWED_ORIGINS: ${MMS_INGEST_ALLOWED_ORIGINS:-}
      MMS_DEFAULT_BUSINESS_SLUG: ${MMS_DEFAULT_BUSINESS_SLUG:-tax-saving-agency}
      MMS_PUBLIC_URL: ${MMS_PUBLIC_URL:-http://localhost:3000}
      # 投稿キューの補充画面（/threads）が GAS のシートを直接読み書きする
      MMS_THREADS_GAS_URL: ${MMS_THREADS_GAS_URL:-}
      MMS_THREADS_GAS_KEY: ${MMS_THREADS_GAS_KEY:-}
      MMS_NOTIFY_WEBHOOK_URL: ${MMS_NOTIFY_WEBHOOK_URL:-}
      MMS_NOTIFY_EMAIL: ${MMS_NOTIFY_EMAIL:-}
      MMS_JOB_SECRET: ${MMS_JOB_SECRET:-}
      # このMac（localhost）専用の自動ログイン。外部公開経由では作動しない
      MMS_DEV_AUTOLOGIN_EMAIL: ${MMS_DEV_AUTOLOGIN_EMAIL:-}
    ports:
      - "127.0.0.1:${MMS_WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
      MMS_DATABASE_URL: ${MMS_DATABASE_URL}
      MMS_WORKER_POLL_SECONDS: ${MMS_WORKER_POLL_SECONDS:-20}
      MMS_WORKER_LEGACY_DIR: /app/legacy
      MMS_JOB_SECRET: ${MMS_JOB_SECRET:-}
      MMS_WEB_INTERNAL_URL: ${MMS_WEB_INTERNAL_URL:-http://web:3000}
      MMS_DEFAULT_BUSINESS_SLUG: ${MMS_DEFAULT_BUSINESS_SLUG:-tax-saving-agency}
      # GSC 日次取得（builtin/gsc_daily.py）。鍵は secrets/ を読み取り専用マウント
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gsc-service-account.json
      MMS_GSC_SITE_URL: ${MMS_GSC_SITE_URL:-}
      # WordPress 同期（読み取りのみ・§3.9.1）
      MMS_WP_BASE_URL: ${MMS_WP_BASE_URL:-}
      MMS_WP_USER: ${MMS_WP_USER:-}
      MMS_WP_APP_PASSWORD: ${MMS_WP_APP_PASSWORD:-}
      MMS_WP_POST_TYPE: ${MMS_WP_POST_TYPE:-posts}
      # Threads 同期（builtin/threads_sync.py）。GAS Web App から pull し
      # /api/ingest/threads へ HMAC 署名つきで投げ直すため INGEST_SECRET も要る
      MMS_THREADS_GAS_URL: ${MMS_THREADS_GAS_URL:-}
      MMS_THREADS_GAS_KEY: ${MMS_THREADS_GAS_KEY:-}
      MMS_THREADS_ACCOUNT_REF: ${MMS_THREADS_ACCOUNT_REF:-setsuzei_masa}
      MMS_INGEST_SECRET: ${MMS_INGEST_SECRET:-}
      # DataForSEO SERP（builtin/dataforseo_serp.py・§3.3.5）
      MMS_DATAFORSEO_LOGIN: ${MMS_DATAFORSEO_LOGIN:-}
      MMS_DATAFORSEO_PASSWORD: ${MMS_DATAFORSEO_PASSWORD:-}
      MMS_DATAFORSEO_MAX_KEYWORDS: ${MMS_DATAFORSEO_MAX_KEYWORDS:-400}
      # ラッコのエクスポート（builtin/rakko_import.py・§3-8）
      MMS_RAKKO_EXPORTS_DIR: /app/rakko-exports
    volumes:
      # ★設計書 §6「既存 Python 資産は書き直さない」。
      #   コピーすると本体と乖離するため、元のディレクトリを **読み取り専用でマウント**する。
      #   これにより メディア事業部側で更新されたスクリプトが即座に worker に反映される。
      - ${MMS_LEGACY_SCRIPTS_DIR:-./services/worker/legacy}:/app/legacy:ro
      # ★認証鍵は読み取り専用でマウント（イメージに焼き込まない）
      - ./secrets:/app/secrets:ro
      # ★ラッコのエクスポートはメディア事業部側が正本（rakko-required.md の規約）。
      #   MMS は読むだけ。書き込むと保存先が二重になりどちらが正か分からなくなる
      - ${MMS_RAKKO_EXPORTS_DIR_HOST:-./data/rakko-exports}:/app/rakko-exports:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
